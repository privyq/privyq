name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  core-go:
    name: Go core
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: core-go
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - run: go vet ./...
      - run: go build ./...
      - run: go test -race -coverprofile=coverage.out ./...

  core-go-liboqs:
    name: Go core (liboqs backend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Build & install liboqs
        run: |
          sudo apt-get update && sudo apt-get install -y cmake ninja-build
          git clone --depth 1 https://github.com/open-quantum-safe/liboqs.git /tmp/liboqs
          cmake -S /tmp/liboqs -B /tmp/liboqs/build -GNinja \
            -DBUILD_SHARED_LIBS=ON -DOQS_BUILD_ONLY_LIB=ON -DCMAKE_INSTALL_PREFIX=/usr/local
          cmake --build /tmp/liboqs/build --parallel
          sudo cmake --build /tmp/liboqs/build --target install
          sudo ldconfig
      - name: Build & test with -tags liboqs (adds Falcon)
        working-directory: core-go
        env:
          PKG_CONFIG_PATH: /usr/local/lib/pkgconfig
        run: |
          go build -tags liboqs ./...
          go test -tags liboqs ./internal/kem/ ./internal/signatures/

  sdk-python:
    name: Python SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk-python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"
      - run: black --check privyq
      - run: pytest -q

  gateway:
    name: FastAPI gateway
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gateway
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - run: pytest -q

  sdk-js:
    name: TypeScript SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk-js
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npm test
      - run: npm run build

  frontend:
    name: Next.js frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  security:
    name: Security scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      # Go vulnerability scanning (ARCH §18.1 supply chain, §27.3).
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          cd core-go && govulncheck ./...
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: pip-audit (SDK + gateway)
        run: |
          pip install pip-audit
          pip-audit -r gateway/requirements.txt || true
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: npm audit (frontend)
        run: cd frontend && npm audit --audit-level=high || true
