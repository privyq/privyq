# Local development stack for PrivyQ (ARCH §19.1).
# Usage: `make dev` (from repo root) or `docker compose -f deploy/docker-compose.yml up --build`.
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: privyq
      POSTGRES_PASSWORD: privyqpass
      POSTGRES_DB: privyq
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U privyq"]
      interval: 5s
      timeout: 3s
      retries: 10

  core:
    build:
      context: ../core-go
    environment:
      GRPC_PORT: "50051"
      KEY_STORAGE: local
      KEY_STORAGE_PATH: /app/data/keys
      KEY_MASTER_PASSWORD: privyq-dev-master
      DB_URL: postgres://privyq:privyqpass@db:5432/privyq?sslmode=disable
      LOG_LEVEL: info
    ports:
      - "50051:50051"
    volumes:
      - core-data:/app/data
    depends_on:
      db:
        condition: service_healthy

  gateway:
    build:
      context: ..
      dockerfile: gateway/Dockerfile
    environment:
      CORE_ADDRESS: core:50051
      SECRET_KEY: privyq-dev-secret
      AUTH_ENABLED: "false"
      RATE_LIMIT_PER_SEC: "100"
    ports:
      - "8000:8000"
    depends_on:
      - core

  frontend:
    build:
      context: ../frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - gateway

volumes:
  db-data:
  core-data:
